
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Learn Bridge</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css file/login.css">
</head>
<body>

    <!-- Background Shapes -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="login-container">

        <!-- Left Side -->
        <div class="login-left">

            <h1>Learn Bridge</h1>

            <p>
                Welcome back! Login to continue your learning
                journey with Learn Bridge.
            </p>

            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80"
                 alt="Students Learning">

        </div>

        <!-- Right Side -->
        <div class="login-right">

            <h2>Login</h2>

            <p class="subtitle">
                Sign in to your account
            </p>

            <form id="loginForm">

                <!-- Email -->
                <div class="input-box">

                    <label>Email</label>

                    <div class="input-field">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email">

                    </div>

                    <small id="emailError"></small>

                </div>

                <!-- Password -->
                <div class="input-box">

                    <label>Password</label>

                    <div class="input-field">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password">

                        <i
                            class="fa-solid fa-eye"
                            id="togglePassword">
                        </i>

                    </div>

                    <small id="passwordError"></small>

                </div>

                <!-- Remember -->
                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <!-- Login -->
                <button
                    type="submit"
                    class="login-btn">

                    Login

                </button>

                <!-- Divider -->
                <div class="divider">

                    <span>OR</span>

                </div>

                <!-- Register -->
                <p class="register">

                    Don't have an account?

                    <a href="register.html">

                        Register

                    </a>

                </p>

            </form>

        </div>

    </div>

    <script src="../java script/login.js"></script>

</body>
</html>
