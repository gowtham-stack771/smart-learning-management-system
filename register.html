<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Learn Bridge</title>

<link rel="stylesheet" href="../css file/register.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>Join Learn Bridge</h1>

<p>
Create your free account and start learning from
industry experts today.
</p>

<img src="https://images.openai.com/static-rsc-4/UcingVUwVb_UyQ3rO2ZoplFzMUA3z1BY3fbVZ5SAR6eA8HFt-QmUYgOem8yICoX6Rorxz9G5kBD_DN3iKoY7BsrqRDCwG7n1h46xyhKlyA5yzOdHo246DkNCfafJM-Skotbo9kTeyg28BbC0kZCwphZmmlP5acNyrRHMy2hu8EHjq2hJjzGPDk0FC_5VBa5a?purpose=fullsize" alt="Register">

</div>


<div class="right">

<form>

<h2>Create Account</h2>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input type="text"
placeholder="Full Name"
required>

</div>


<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
placeholder="Email Address"
required>

</div>


<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input type="tel"
placeholder="Mobile Number"
required>

</div>


<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password"
placeholder="Password"
required>

</div>


<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password"
placeholder="Confirm Password"
required>

</div>
<button type="button" onclick="window.location.href='dashboard.html'">
    Create Account
</button>
<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

</body>

</html>
